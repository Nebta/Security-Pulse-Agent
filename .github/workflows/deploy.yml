name: Deploy infra (tag)

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      customers:
        description: 'Comma-separated list of customer IDs to deploy (default: all)'
        required: false
        default: ''
      what_if_only:
        description: 'Run what-if only (no apply)'
        required: false
        default: 'false'

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Discover customer parameter files
        id: discover
        shell: bash
        run: |
          input="${{ inputs.customers }}"
          if [ -z "$input" ]; then
            files=$(ls infra/customers/*.parameters.json | grep -v _default || true)
          else
            files=""
            for c in $(echo "$input" | tr ',' ' '); do
              f="infra/customers/${c}.parameters.json"
              if [ ! -f "$f" ]; then echo "WARN: $f not found"; continue; fi
              files="$files $f"
            done
          fi
          echo "files=$files" >> $GITHUB_OUTPUT
      - name: Bicep what-if per customer
        shell: bash
        run: |
          for f in ${{ steps.discover.outputs.files }}; do
            echo "==> what-if $f"
            loc=$(jq -r '.parameters.location.value' "$f")
            az deployment sub what-if --location "$loc" --template-file infra/main.bicep --parameters "@$f" || exit 1
          done
      - name: Apply (skipped if what_if_only=true)
        if: ${{ inputs.what_if_only != 'true' }}
        shell: pwsh
        run: |
          foreach ($f in ('${{ steps.discover.outputs.files }}' -split '\s+' | Where-Object { $_ })) {
            Write-Host "==> deploy $f"
            ./scripts/deploy.ps1 `
              -SubscriptionId "${{ secrets.AZURE_SUBSCRIPTION_ID }}" `
              -Location (Get-Content $f | ConvertFrom-Json).parameters.location.value `
              -ParametersFile $f
          }
