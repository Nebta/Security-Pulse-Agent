name: Upload templates

on:
  push:
    branches: [main]
    paths:
      - 'templates/customers/**'
  workflow_dispatch:
    inputs:
      customer:
        description: 'Single customer ID to upload (default: all changed)'
        required: false
        default: ''

permissions:
  id-token: write
  contents: read

jobs:
  upload:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Determine customers to upload
        id: pick
        shell: bash
        run: |
          if [ -n "${{ inputs.customer }}" ]; then
            echo "customers=${{ inputs.customer }}" >> $GITHUB_OUTPUT
            exit 0
          fi
          changed=$(git diff --name-only HEAD~1 HEAD | grep '^templates/customers/' | awk -F/ '{print $3}' | sort -u | grep -v '^_default$' || true)
          customers=$(echo "$changed" | tr '\n' ',' | sed 's/,$//')
          echo "customers=$customers" >> $GITHUB_OUTPUT
      - name: Upload per customer
        if: steps.pick.outputs.customers != ''
        shell: pwsh
        run: |
          $sub = "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          foreach ($c in ('${{ steps.pick.outputs.customers }}' -split ',' | Where-Object { $_ })) {
            $rg = "rg-secpulse-$($c.ToLower())"
            $sa = az resource list -g $rg --resource-type "Microsoft.Storage/storageAccounts" --query "[0].name" -o tsv
            if (-not $sa) { Write-Warning "No storage account in $rg; skipping $c"; continue }
            ./scripts/upload-templates.ps1 -StorageAccount $sa -CustomerId $c
          }
