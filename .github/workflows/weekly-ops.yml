name: Weekly ops digest (health + drift)

on:
  schedule:
    - cron: '0 5 * * 1'  # Mondays 05:00 UTC
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  health:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Run health-check.ps1 with what-if drift
        shell: pwsh
        run: |
          ./scripts/health-check.ps1 `
            -SubscriptionId "${{ secrets.AZURE_SUBSCRIPTION_ID }}" `
            -IncludeWhatIf `
            -SendDigest `
            -OpsEmail "${{ secrets.OPS_ALERT_EMAIL }}" `
            -SenderMailbox "${{ secrets.SENDER_MAILBOX }}"
