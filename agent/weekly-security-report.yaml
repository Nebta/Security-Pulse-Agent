# =============================================================================
# Security Copilot custom agent: WeeklySecurityReport
# -----------------------------------------------------------------------------
# Status: SKELETON.
#
# Microsoft's Security Copilot "Agent Builder" YAML schema is still evolving.
# Treat the field names below as placeholders to be reconciled against the
# Agent Builder schema currently visible in your tenant before upload.
# Anything marked TODO-VERIFY must be confirmed against the live portal /
# published YAML reference.
#
# This agent does NOT collect raw telemetry. The Logic App performs
# deterministic collection and passes a normalized JSON dataset to the agent.
# The agent only produces analyst-grade narrative + structured JSON for
# downstream HTML rendering.
# =============================================================================

Descriptor:
  Name: WeeklySecurityReport
  DisplayName: Weekly Security Report
  Description: >
    Synthesizes a weekly executive-grade security report from a pre-collected,
    normalized dataset (vulnerabilities, threat landscape, incidents, risky
    identities, Sentinel cost). Returns strict JSON for downstream rendering.

SkillGroups:
  - Format: 2025-03-01-preview        # TODO-VERIFY against current Agent Builder version
    SkillGroupName: ReportSynthesis
    Skills:

      - Name: SynthesizeWeeklyReport
        DisplayName: Synthesize weekly security report
        Description: >
          Given a JSON dataset describing the past week's security posture,
          produce a structured JSON response with executive summary and
          per-section commentary suitable for embedding in an HTML email.
        Inputs:
          - Name: dataset
            Description: Normalized JSON dataset for the reporting period.
            Required: true
            DefaultValue: ""
          - Name: customerContext
            Description: >
              Optional customer-specific context (industry, tone, audience,
              focus areas) loaded from the per-customer template config.
            Required: false
            DefaultValue: ""
        Settings:
          ModelName: SecurityCopilotPrimary    # TODO-VERIFY name in current schema
          Temperature: 0.2
        Template: |
          You are a senior SOC analyst preparing a weekly security report for
          security leadership. The report period and all numerical data are
          provided in the dataset. NEVER invent numbers, names, CVE IDs,
          incident IDs, costs, or dates - use only values present in the
          dataset. If a section's data is empty or missing, say so explicitly.

          Customer context (audience, industry, tone, focus areas):
          {{ customerContext }}

          Return ONLY valid JSON matching this contract (no Markdown, no
          backticks, no commentary outside the JSON):

          {
            "executiveSummary": "<2-4 sentence plain-English summary>",
            "riskRating": "Low|Moderate|Elevated|High|Critical",
            "sections": {
              "vulnerabilities":   { "headline": "...", "commentary": "...", "recommendations": ["...", "..."] },
              "threatLandscape":   { "headline": "...", "commentary": "...", "recommendations": ["...", "..."] },
              "xdrIncidents":      { "headline": "...", "commentary": "...", "recommendations": ["...", "..."] },
              "sentinelIncidents": { "headline": "...", "commentary": "...", "recommendations": ["...", "..."] },
              "riskyIdentities":   { "headline": "...", "commentary": "...", "recommendations": ["...", "..."] },
              "sentinelCost":      { "headline": "...", "commentary": "...", "recommendations": ["...", "..."] }
            },
            "topActions": ["<single highest-impact action>", "..."]
          }

          Rules:
          - Keep each "commentary" under 80 words.
          - Each "recommendations" list: 0-3 items, each < 20 words.
          - "topActions": exactly 3 items, ranked by risk reduction.
          - No personal names; refer to identities by UPN or "user".
          - No raw HTML, no Markdown formatting in any string value.
          - Adapt tone and emphasis to the customer context, but never alter
            facts or numbers.

          ===== DATASET =====
          {{ dataset }}

AgentDefinitions:
  - Name: WeeklySecurityReportAgent
    DisplayName: Weekly Security Report Agent
    Description: Produces the weekly security report narrative.
    EntryPointSkill: SynthesizeWeeklyReport
    Inputs:
      - Name: dataset
        Required: true
      - Name: customerContext
        Required: false
    Settings:
      MaxResponseTokens: 4000
      ResponseFormat: json
