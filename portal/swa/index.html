<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Security Pulse — Customer Portal</title>
  <style>
    :root { --pri:#0b3d91; --acc:#16a34a; --bg:#f6f8fa; --fg:#1f2328; --mute:#57606a; --br:#d0d7de; --warn:#fff3cd; --err:#fee; }
    * { box-sizing: border-box; }
    body { font-family: -apple-system, Segoe UI, system-ui, sans-serif; background: var(--bg); color: var(--fg); margin: 0; }
    header { background: var(--pri); color: #fff; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; }
    header h1 { margin: 0; font-size: 18px; font-weight: 600; }
    header .who { font-size: 13px; opacity: 0.9; }
    header a { color: #fff; opacity: 0.85; text-decoration: none; margin-left: 12px; }
    header a:hover { opacity: 1; text-decoration: underline; }
    main { max-width: 1100px; margin: 24px auto; padding: 0 24px; }
    .card { background: #fff; border: 1px solid var(--br); border-radius: 8px; padding: 20px 24px; margin-bottom: 20px; }
    .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    label { display: block; font-size: 12px; font-weight: 600; color: var(--mute); margin-bottom: 4px; }
    input[type=text], input[type=color], select, textarea { font: inherit; border: 1px solid var(--br); border-radius: 6px; padding: 6px 10px; width: 100%; }
    textarea { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 13px; min-height: 70px; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
    .grid-sec { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px 16px; }
    button { font: inherit; background: var(--pri); color: #fff; border: 0; border-radius: 6px; padding: 8px 16px; cursor: pointer; }
    button.secondary { background: #fff; color: var(--pri); border: 1px solid var(--pri); }
    button:disabled { opacity: 0.55; cursor: wait; }
    .status-Succeeded { color: #1a7f37; font-weight: 600; }
    .status-Failed { color: #cf222e; font-weight: 600; }
    .status-Running { color: #9a6700; font-weight: 600; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { text-align: left; padding: 6px 8px; border-bottom: 1px solid var(--br); }
    th { background: #f6f8fa; font-weight: 600; color: var(--mute); }
    .toast { position: fixed; right: 24px; bottom: 24px; padding: 12px 18px; border-radius: 8px;
             background: #1a7f37; color: #fff; box-shadow: 0 6px 24px rgba(0,0,0,.15); display: none; }
    .toast.err { background: #cf222e; }
    .login { max-width: 480px; margin: 80px auto; text-align: center; }
    code { background: #f6f8fa; padding: 2px 6px; border-radius: 4px; font-size: 12px; }
    .err-box { background: var(--err); border: 1px solid #fab; padding: 8px 12px; border-radius: 6px; font-size: 13px; color: #82071e; }
    .warn-box { background: var(--warn); border: 1px solid #f0c674; padding: 8px 12px; border-radius: 6px; font-size: 13px; color: #664d03; }
    /* Wizard */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 9000; display: flex; align-items: center; justify-content: center; }
    .modal { background: #fff; width: min(720px, 94vw); max-height: 92vh; overflow-y: auto; border-radius: 10px; padding: 24px 28px; box-shadow: 0 20px 60px rgba(0,0,0,.25); }
    .modal h2 { margin: 0 0 8px 0; font-size: 20px; }
    .modal .steps { display: flex; gap: 6px; color: var(--mute); font-size: 12px; margin: 4px 0 18px 0; text-transform: uppercase; letter-spacing: 0.5px; }
    .modal .steps .active { color: var(--pri); font-weight: 700; }
    .modal .actions { display: flex; justify-content: space-between; gap: 8px; margin-top: 22px; border-top: 1px solid var(--br); padding-top: 16px; }
    .modal .preview { display: flex; gap: 14px; align-items: center; background: #f6f8fa; padding: 12px; border-radius: 8px; margin-top: 8px; }
    .modal .preview img { width: 48px; height: 48px; object-fit: contain; background: #fff; border-radius: 8px; border: 1px solid var(--br); }
    .swatch { display: inline-block; width: 14px; height: 14px; border-radius: 3px; border: 1px solid var(--br); vertical-align: middle; margin-right: 6px; }
    .checklist li { margin-bottom: 6px; }
    .new-btn { background: #fff; color: var(--pri); border: 1px solid rgba(255,255,255,.6); padding: 6px 12px; margin-right: 8px; }
  </style>
</head>
<body>
  <div id="root">Loading…</div>
  <div id="toast" class="toast"></div>
  <script type="module" src="./app.js"></script>
</body>
</html>
